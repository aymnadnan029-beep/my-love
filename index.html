<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ يا حبيبتي رويدا ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#090b18;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

.stars{
position:fixed;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px,transparent 1px);
background-size:35px 35px;
animation:move 25s linear infinite;
opacity:.4;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(35px);}
}

.box{

position:relative;
z-index:2;
width:90%;
max-width:520px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
text-align:center;

}

h1{

color:#ff9ed2;
margin-bottom:20px;

}

p{

font-size:20px;
line-height:1.8;

}

button{

margin-top:25px;
padding:14px 35px;
font-size:18px;
border:none;
border-radius:12px;
background:#ff69b4;
color:white;
cursor:pointer;

}

#letter{

display:none;
margin-top:25px;
text-align:right;
line-height:2;
font-size:22px;
white-space:pre-wrap;

}

.heart{

position:fixed;
top:-30px;
font-size:24px;
animation:fall linear forwards;

}

@keyframes fall{

to{

transform:translateY(110vh);
opacity:0;

}

}

</style>

</head>

<body>

<div class="stars"></div>

<div class="box">

<h1>❤️ يا حبيبتي رويدا ❤️</h1>

<p>

كل اللي رح تقرئيه بعد شوي...
مكتوب من كل قلبي إلك. 🤍

</p>

<button onclick="start()">

💌 افتحي الرسالة

</button>

<div id="letter"></div>

</div>

<script>

const text=`

حبيبتي رويدا... ❤️

يمكن تكون الليلة مثل أي ليلة،
لكن بالنسبة إلي مختلفة...

لأنك أول وآخر فكرة بتيجي على بالي.

بحبك كتير حبيبتي،
بعشقك وبعبدك.

الله ما يحرمني منك
يا سبب فرحتي،
ويا أجمل نعمة بحياتي.

وبعرف إنه بعد فترة صغيرة،
بإذن الله،
رح يكون عنا بيت حلو ودافي،
يجمعنا إحنا الاثنين،
ونعيش فيه أجمل أيام عمرنا.

بيت مليان حب،
وراحة،
وضحك،
وكل زاوية فيه إلها ذكرى حلوة إلنا.

وحبيبتي...
بعدين رح يصير عنا ولدين حلوين،
رحمة وأحمد.

وتكون ضحكتهم مالية البيت،
ونعيش سوا كل اللحظات
اللي كنا نحلم فيها.

أنتِ أجمل شيء صار بحياتي...
وكل يوم بحبك أكثر
من اليوم اللي قبله. ❤️

`;

let i = 0;

function start(){

document.querySelector("button").style.display="none";

document.getElementById("letter").style.display="block";

type();

}

function type(){

if(i < text.length){

document.getElementById("letter").innerHTML += text.charAt(i);

i++;

setTimeout(type,35);

}else{

setInterval(createHeart,250);

}

}

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(function(){

heart.remove();

},5000);

}

</script>

</body>
</html>

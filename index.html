<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 رسالة من المستقبل</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#050816;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.stars{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(white 1px,transparent 1px);
background-size:35px 35px;
animation:move 25s linear infinite;
opacity:.4;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(35px);}
}

.box{
position:relative;
z-index:2;
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
padding:30px;
border-radius:20px;
width:90%;
max-width:520px;
text-align:center;
}

h1{
margin-bottom:20px;
color:#7ec8ff;
}

#loading{
font-size:22px;
}

.progress{
width:100%;
height:14px;
background:#222;
border-radius:20px;
margin-top:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#4fc3ff;
transition:.3s;
}

#future{
display:none;
}

button{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:12px;
background:#4fc3ff;
font-size:18px;
cursor:pointer;
color:#000;
font-weight:bold;
}

#letter{
display:none;
margin-top:25px;
font-size:22px;
line-height:2;
text-align:right;
white-space:pre-wrap;
}

.heart{
position:fixed;
top:-30px;
font-size:25px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="box">

<div id="loading">

<h1>📡 جاري الاتصال بالمستقبل...</h1>

<div id="percent">0%</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>

<div id="future">

<h1>📅 رسالة وصلت من عام 2035</h1>

<p>تم العثور على رسالة موجهة إلى رويدا ❤️</p>

<button onclick="openLetter()">
💌 فتح الرسالة
</button>

<div id="letter"></div>

</div>
</div>

<script>

let p=0;

let loader=setInterval(function(){

p++;

document.getElementById("percent").innerHTML=p+"%";

document.getElementById("bar").style.width=p+"%";

if(p>=100){

clearInterval(loader);

document.getElementById("loading").style.display="none";

document.getElementById("future").style.display="block";

}

},40);

const text=
`💌 إلى حبيبتي رويدا...

إذا كنتِ تقرئين هذه الرسالة، فهذا يعني أننا وصلنا إلى عام 2035... ❤️

ورغم مرور السنوات، هناك شيء لم يتغير...

حبي لك.

كل يوم أختارك من جديد، وكل يوم أشعر أني محظوظ لأنك في حياتي.

آسف على أي لحظة قصرت فيها معك، وأتمنى أن أكون دائمًا سبب ابتسامتك.

بحبك كتير حبيبتي، بعشقك وبعبدك. ❤️

وحلمت فيكي أحلى حلم يا حلمي... وتمنيت ما أصحى منه أبدًا.

الله ما يحرمني منك يا سبب فرحتي، ويا أجمل نعمة بحياتي.

وحبيبتي... هلأ صار عنا ولدين حلوين، رحمة وأحمد. 🥹❤️

كل يوم بسمع ضحكتهم وهي مالية البيت، وبشوفك أحلى أم بالدنيا، وبحمد الله على كل لحظة جمعنا فيها.

يمكن تكون هاي مجرد رسالة من المستقبل... ويمكن مجرد حلم جميل...

لكن بتمنى من كل قلبي يصير حقيقة بإذن الله.

إذا وصلتي لهون...

بدي تعرفي شغلة وحدة...

أحبك اليوم...

وأحبك بكرة...

وسأحبك بعد عشر سنوات...

وكل يوم أكثر من اليوم اللي قبله.

تصبحي على ألف خير يا أجمل إنسانة في حياتي. 🌹❤️`;

let i=0;

function openLetter(){

document.querySelector("button").style.display="none";

document.getElementById("letter").style.display="block";

type();

}

function type(){

if(i<text.length){

document.getElementById("letter").innerHTML+=text.charAt(i);

i++;

setTimeout(type,40);

}else{

setInterval(createHeart,250);

}

}

function createHeart(){

const h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(h);

setTimeout(function(){

h.remove();

},5000);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 مفاجأة لرويدا ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
background:#fff;
width:90%;
max-width:450px;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
color:#ff4081;
margin-bottom:20px;
}

.gifts{
display:flex;
justify-content:space-around;
margin-top:20px;
}

.gift{
font-size:70px;
cursor:pointer;
transition:.3s;
}

.gift:hover{
transform:scale(1.2);
}

#count{
display:none;
font-size:70px;
font-weight:bold;
color:#ff4081;
margin-top:20px;
}

#message{
display:none;
margin-top:20px;
font-size:20px;
line-height:2;
color:#444;
}

.heart{
position:fixed;
top:-40px;
font-size:25px;
animation:fall linear forwards;
}

@keyframes fall{
from{
transform:translateY(-50px);
opacity:1;
}
to{
transform:translateY(110vh);
opacity:0;
}
}
</style>

</head>

<body>

<div class="container">

<h1>🎁 اختاري هدية واحدة فقط يا رويدا ❤️</h1>

<div class="gifts">
<div class="gift" onclick="openGift(1)">🎁</div>
<div class="gift" onclick="openGift(2)">🎁</div>
<div class="gift" onclick="openGift(3)">🎁</div>
</div>

<div id="count">20</div>

<div id="message"></div>

</div>

<script>

const messages = {

1:`
<h2>❤️ رسالة من قلبي ❤️</h2>

حبيبتي رويدا...

<br><br>

قبل ما تنامي حبيت أترك لك هالمفاجأة الصغيرة.

<br><br>

يمكن بسيطة، لكن كل حرف فيها طالع من قلبي.

<br><br>

بحبك كتير حبيبتي، بعشقك وبعبدك. ❤️

<br><br>

الله ما يحرمني منك يا أجمل نعمة بحياتي.

<br><br>

وجودك هو أجمل شيء صار معي، وكل يوم بحبك أكثر من اليوم اللي قبله. 🌹
`,

2:`
<h2>🌙 أمنية الليلة 🌙</h2>

يا روحي...

<br><br>

بتمنى تنامي مرتاحة وتشوفي أحلى الأحلام.

<br><br>

وحلمت فيكي أحلى حلم يا حلمي. ❤️

<br><br>

الله يحفظك ويخليكي إلي.

<br><br>

تصبحي على ألف خير يا أغلى إنسانة بحياتي. 🤍
`,

3:`
<h2>💖 الهدية الحقيقية 💖</h2>

كنتِ مفكرة إن الهدية داخل الصندوق...

<br><br>

لكن الحقيقة إن <b>إنتِ الهدية</b> اللي غيرت حياتي.

<br><br>

بحبك كتير حبيبتي، بعشقك وبعبدك.

<br><br>

الله ما يحرمني منك يا سبب فرحتي.

<br><br>

وجودك بحياتي أجمل نعمة.

<br><br>

أحبك اليوم، وبكرة، وكل يوم أكثر من اللي قبله. ❤️🌹
`

};

function openGift(num){

document.querySelector(".gifts").style.display="none";

let sec=20;

document.getElementById("count").style.display="block";

const timer=setInterval(function(){

document.getElementById("count").innerHTML=sec;

sec--;

if(sec<0){

clearInterval(timer);

document.getElementById("count").style.display="none";

document.getElementById("message").style.display="block";

document.getElementById("message").innerHTML=messages[num];

setInterval(createHeart,300);

}

},1000);

}

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},5000);

}

</script>

</body>
</html>

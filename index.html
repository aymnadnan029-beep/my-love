<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ يا حبيبتي رويدا ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#090b18;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
color:white;
}

.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px,transparent 1px);
background-size:40px 40px;
animation:starsMove 25s linear infinite;
opacity:.35;
}

@keyframes starsMove{
0%{transform:translateY(0);}
100%{transform:translateY(40px);}
}

.box{
position:relative;
z-index:5;
width:90%;
max-width:520px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
text-align:center;
}

h1{
color:#ff8fc6;
margin-bottom:20px;
}

p{
font-size:20px;
line-height:1.8;
}

button{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:15px;
background:#ff5fa2;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.hidden{
display:none;
}

#game button{
display:block;
width:100%;
margin:12px 0;
}

#message{
margin-top:20px;
font-size:22px;
line-height:2;
white-space:pre-wrap;
text-align:right;
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="box">

<div id="start">

<h1>❤️ يا حبيبتي رويدا ❤️</h1>

<p>

في لعبة صغيرة...
ولو عرفتي جوابها الصحيح،
رح توصلي لرسالة مكتوبة من كل قلبي إلك.

</p>

<button onclick="startGame()">

ابدئي ❤️

</button>

</div>

<div id="game" class="hidden">

<h2>مين أكثر شخص بحبك؟ ❤️</h2>

<button onclick="wrong()">شخص مجهول</button>

<button onclick="wrong()">أحمد</button>

<button onclick="correct()">أنا ❤️</button>

</div>

<div id="count" class="hidden">

<h2 id="counter">10</h2>

<p>جاري فتح الرسالة...</p>

</div>

<div id="message" class="hidden"></div>

</div>

<script>
function startGame(){

document.getElementById("start").classList.add("hidden");

document.getElementById("game").classList.remove("hidden");

}

function wrong(){

alert("😅 مو هي الإجابة... جربي مرة ثانية ❤️");

}

function correct(){

document.getElementById("game").classList.add("hidden");

document.getElementById("count").classList.remove("hidden");

let n=10;

document.getElementById("counter").innerHTML=n;

let timer=setInterval(function(){

n--;

document.getElementById("counter").innerHTML=n;

if(n<=0){

clearInterval(timer);

document.getElementById("count").classList.add("hidden");

document.getElementById("message").classList.remove("hidden");

showMessage();

}

},1000);

}

const text=`
حبيبتي رويدا... ❤️

يمكن تكون الليلة مثل أي ليلة،
لكن بالنسبة إلي مختلفة...

لأنك أول وآخر فكرة بتيجي على بالي.

بحبك كتير حبيبتي،
بعشقك وبعبدك.

الله ما يحرمني منك،
يا سبب فرحتي،
ويا أجمل نعمة بحياتي.

وبعرف إنه بعد فترة صغيرة،
بإذن الله،
رح يكون عنا بيت حلو ودافي،
يجمعنا إحنا الاثنين،
ونعيش فيه أجمل أيام عمرنا.

بيت مليان حب،
وراحة،
وضحك،
وكل زاوية فيه إلها ذكرى حلوة إلنا.

وحبيبتي...
بعدين رح يصير عنا ولدين حلوين،
رحمة وأحمد.

وتكون ضحكتهم مالية البيت،
ونعيش سوا كل اللحظات
اللي كنا نحلم فيها.

أنتِ أجمل شيء صار بحياتي،
وكل يوم بحبك أكثر
من اليوم اللي قبله. ❤️

`;
let index=0;

function showMessage(){

if(index<text.length){

document.getElementById("message").innerHTML+=text.charAt(index);

index++;

setTimeout(showMessage,35);

}else{

setInterval(createHeart,300);

}

}

function createHeart(){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.style.position="fixed";

heart.style.left=Math.random()*100+"vw";

heart.style.top="-30px";

heart.style.fontSize=(20+Math.random()*20)+"px";

heart.style.pointerEvents="none";

heart.style.zIndex="999";

heart.style.transition="transform 6s linear, opacity 6s linear";

document.body.appendChild(heart);

setTimeout(function(){

heart.style.transform="translateY(110vh)";

heart.style.opacity="0";

},50);

setTimeout(function(){

heart.remove();

},6200);

}

</script>

</body>
</html>
